name: Nightly Pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # 11pm EST = 4am UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          PYTHONPATH: .
          ENABLE_BOND_SCRAPE: 'false'
          ENABLE_SWING_PIPELINE: 'false'
          ENABLE_GEMINI: 'false'
        run: python pipeline/main.py --test

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest pipeline/tests/ -v --tb=short

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/results.json output/alerts.json
          git diff --staged --quiet || git commit -m "chore: update pipeline results $(date -u '+%Y-%m-%d')"
          git push
